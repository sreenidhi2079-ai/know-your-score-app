<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Know Your Score | AI Insights</title>
    <!-- Using styles.css based on actual filesystem -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
</head>

<body>

<div class="container">
    <div class="title-wrapper">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="logo">
        <h1>Know Your Score</h1>
    </div>
    <p class="subtitle">AI-Powered Smartphone Addiction Prediction</p>

    <form action="/predict" method="POST">
        <div class="input-group">
            <label for="screen_time">Daily Screen Time</label>
            <input type="number" step="0.1" name="screen_time" id="screen_time" placeholder="e.g. 5.5 hours" required>
        </div>

        <div class="input-group">
            <label for="phone_checks">Phone Checks</label>
            <input type="number" name="phone_checks" id="phone_checks" placeholder="e.g. 50 times/day" required>
        </div>

        <div class="input-group">
            <label for="hours_without">Hours Without Phone</label>
            <input type="number" step="0.1" name="hours_without" id="hours_without" placeholder="e.g. 2.0 hours" required>
        </div>

        <button type="submit">✨ Generate Insights</button>
    </form>

    <div class="nav-links">
        <a href="/about" style="display:inline-block; margin-top:20px;">ℹ️ About this Project</a>
    </div>
</div>

<script>
    // Simple micro-animation on form submit
    document.querySelector('form').addEventListener('submit', function(e) {
        const btn = this.querySelector('button');
        btn.innerHTML = '⚙️ Analyzing...';
        btn.style.opacity = '0.8';
        btn.style.pointerEvents = 'none';
    });
</script>
</body>
</html>
